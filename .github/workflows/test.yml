name: Run tests

on: pull_request

env:
  CALKIT_TEST_ZENODO_TOKEN: ${{ secrets.CALKIT_ZENODO_TOKEN }}

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Configure Git Credentials
        run: |
          git config --global user.name github-actions[bot]
          git config --global user.email 41898282+github-actions[bot]@users.noreply.github.com
          git config --global init.defaultBranch main
          git config --global push.autoSetupRemote true
      - name: Setup uv
        uses: astral-sh/setup-uv@v5
      - name: Setup Miniforge
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          auto-activate-base: true
          conda-remove-defaults: true
      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.6
      - name: Install Juliaup
        uses: julia-actions/install-juliaup@v2
        with:
          channel: "1" # Installs the latest v1 Julia version via Juliaup
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: latest
      - name: Run tests
        run: |
          pixi --version
          conda --version
          docker --version || true
          juliaup --version
          Rscript --version
          uv --version
          uv run pytest -n 4 --durations=10
  ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup uv
        uses: astral-sh/setup-uv@v5
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install JupyterLab extension dependencies
        run: uv run jlpm install
      - name: Build JupyterLab extension
        run: uv run jlpm build:prod
      - name: Run JupyterLab extension front end unit tests
        run: uv run jlpm test
      - name: Install UI test dependencies
        run: |
          cd ui-tests
          uv run jlpm install
          uv run jlpm playwright install
      - name: Run UI tests
        run: |
          cd ui-tests
          uv run jlpm playwright test -u --reporter=list
      - name: Upload Playwright test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: ui-tests/test-results/
          retention-days: 7
  vscode-ext:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-ext
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vscode-ext/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run VS Code extension tests
        run: npm test
